<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-say-portfolio" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#0d1424"/>
    </linearGradient>
    <pattern id="grid-say-portfolio" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0 H0 V30" fill="none" stroke="#00f6ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="glow-say-portfolio">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg-say-portfolio)"/>
  <rect width="600" height="400" fill="url(#grid-say-portfolio)"/>
  <rect x="2" y="2" width="596" height="396" fill="none" stroke="#00f6ff" stroke-opacity="0.35" stroke-width="2"/>
  <circle cx="28" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="48" cy="28" r="6" fill="#febc2e"/>
  <circle cx="68" cy="28" r="6" fill="#28c840"/>
  <text x="300" y="34" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#7d8aa3">~/projects/say-portfolio</text>
  <g transform="translate(200,30) scale(1)" filter="url(#glow-say-portfolio)" opacity="0.95">
    <rect x="45" y="55" width="110" height="85" rx="6" fill="none" stroke="#00f6ff" stroke-width="4"/><line x1="45" y1="75" x2="155" y2="75" stroke="#00f6ff" stroke-width="4"/><circle cx="58" cy="65" r="3" fill="#00f6ff"/><circle cx="70" cy="65" r="3" fill="#00f6ff"/><circle cx="82" cy="65" r="3" fill="#00f6ff"/><path d="M65 95 L85 110 L65 125 M105 125 L135 125" stroke="#00f6ff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="300" y="320" text-anchor="middle" font-family="Sora, sans-serif" font-size="26" font-weight="700" fill="#e8f3ff">SAY-Portfolio</text>
  <text x="300" y="350" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#00f6ff">&gt; view_on_github --repo</text>
</svg>
