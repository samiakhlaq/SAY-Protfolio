  <g transform="translate(200,30) scale(1)" filter="url(#glow-securepass-analyzer)" opacity="0.95">
    <path d="M100 40 L150 58 V100 C150 135 128 158 100 168 C72 158 50 135 50 100 V58 Z" fill="none" stroke="#00f6ff" stroke-width="4"/><path d="M80 100 L94 114 L122 84" fill="none" stroke="#00f6ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
