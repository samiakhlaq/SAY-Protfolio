<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-qr-code-generator" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#0d1424"/>
    </linearGradient>
    <pattern id="grid-qr-code-generator" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0 H0 V30" fill="none" stroke="#b026ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="glow-qr-code-generator">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg-qr-code-generator)"/>
  <rect width="600" height="400" fill="url(#grid-qr-code-generator)"/>
  <rect x="2" y="2" width="596" height="396" fill="none" stroke="#b026ff" stroke-opacity="0.35" stroke-width="2"/>
